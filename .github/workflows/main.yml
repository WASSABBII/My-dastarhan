name: Dastarhan Full-Stack CI

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Проверка безопасности файловой системы
      - name: Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # 2. Сборка и запуск контейнеров
      - name: Build and Start Containers
        run: |
          docker compose up -d
          echo "Waiting for services to start..."
          sleep 20

      # 3. HEALTH CHECK (Проверка связи с NestJS)
      - name: Health Check
        run: |
          for i in {1..10}; do
            # Проверяем именно /api/health
            if curl -s http://localhost:8080/api/health; then
              echo "✅ Backend is alive and healthy!"
              exit 0
            fi
            echo "Waiting for backend... (attempt $i)"
            sleep 10
          done
          echo "❌ Backend check failed"
          docker compose logs backend
          exit 1

      # 4. Логи в случае неудачи (для отладки)
      - name: Debug Logs on Failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs backend

      # 5. Уведомление в Telegram
      - name: Telegram Notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🥘 Проект: DASTARHAN
            Статус: ${{ job.status == 'success' && '✅ Успешно' || '❌ Ошибка' }}
            Событие: Push в main
            Результат: Security и Health Check завершены.
# Final trigger
